<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kasandra · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060912;--card:#0d131f;--card-hi:#131b2e;--border:rgba(0,212,255,.18);--border-soft:rgba(0,212,255,.08);--accent:#00d4ff;--green:#00ff88;--red:#ff3366;--amber:#ffaa00;--text:#e0e6ed;--text-2:#a8b2c1;--dim:#5a6b80;--mono:'JetBrains Mono',monospace;--display:'Space Grotesk',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,212,255,.10),transparent 60%),var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;font-size:14px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,212,255,.018) 2px,rgba(0,212,255,.018) 3px)}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 22px}
/* login gate */
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:linear-gradient(135deg,var(--card),var(--card-hi));border:1px solid var(--border);border-radius:16px;padding:38px 34px;width:340px;box-shadow:0 0 40px rgba(0,212,255,.08)}
.brand{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:.15em;color:var(--accent);text-shadow:0 0 18px rgba(0,212,255,.35);text-align:center;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.brand .dot{width:9px;height:9px;background:var(--green);border-radius:50%;box-shadow:0 0 12px var(--green)}
.sub{text-align:center;font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:26px}
input{width:100%;padding:13px;border-radius:9px;border:1px solid var(--border);background:#0a0e16;color:var(--text);font-family:var(--mono);font-size:14px;text-align:center;letter-spacing:2px}
input:focus{outline:none;border-color:var(--accent)}
button.go{width:100%;margin-top:16px;padding:13px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),#0095c8);color:#03121a;font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.05em;cursor:pointer}
.err{color:var(--red);font-size:12px;min-height:16px;margin-top:10px;text-align:center}
/* panel */
#panel{display:none;padding:30px 0}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.top .brand{justify-content:flex-start;margin:0}
.signout{font-size:12px;color:var(--dim);text-decoration:none;border:1px solid var(--border);padding:7px 14px;border-radius:7px;cursor:pointer}
.signout:hover{color:var(--accent);border-color:var(--accent)}
.counts{display:flex;gap:14px;margin-bottom:20px}
.count{background:linear-gradient(135deg,var(--card),var(--card-hi));border:1px solid var(--border);border-radius:10px;padding:16px 22px;flex:1;text-align:center}
.count .v{font-family:var(--display);font-size:28px;font-weight:700}
.count.p .v{color:var(--amber)}.count.a .v{color:var(--green)}
.count .l{font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-top:6px}
.tbl{background:linear-gradient(135deg,var(--card),var(--card-hi));border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:12px 18px;font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;border-bottom:1px solid var(--border-soft);font-weight:500}
td{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.03)}
tr:hover td{background:rgba(0,212,255,.03)}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.5px;text-transform:uppercase}
.badge.pending{background:rgba(255,170,0,.12);color:var(--amber)}
.badge.approved{background:rgba(0,255,136,.12);color:var(--green)}
.badge.rejected{background:rgba(255,51,102,.12);color:var(--red)}
.act{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;background:transparent;font-family:var(--mono);margin-right:6px}
.act.approve{border-color:var(--green);color:var(--green)}
.act.approve:hover{background:rgba(0,255,136,.1)}
.act.revoke{border-color:var(--dim);color:var(--dim)}
.act.revoke:hover{border-color:var(--red);color:var(--red)}
.muted{color:var(--dim);font-size:12px}
@media(max-width:760px){
  .wrap{padding:0 14px}
  .counts{flex-wrap:wrap}
  .count{min-width:90px}
  .tbl{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:680px}
  th,td{padding:10px 12px;font-size:12px}
  .act{display:block;width:100%;margin:3px 0}
}
</style></head><body>

<div id="gate">
  <div class="box">
    <div class="brand"><span class="dot"></span>KASANDRA</div>
    <div class="sub">Admin Access</div>
    <input id="apw" type="password" placeholder="admin password" autofocus onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="go" onclick="adminLogin()">ENTER</button>
    <div class="err" id="aerr"></div>
  </div>
</div>

<div id="panel"><div class="wrap">
  <div class="top">
    <div class="brand"><span class="dot"></span>KASANDRA <span style="color:var(--dim);font-size:12px;letter-spacing:1px;margin-left:8px">ADMIN</span></div>
    <a class="signout" onclick="adminSignout()">Sign out</a>
  </div>
  <div class="counts">
    <div class="count p"><div class="v" id="c-pending">0</div><div class="l">Pending</div></div>
    <div class="count a"><div class="v" id="c-approved">0</div><div class="l">Active</div></div>
    <div class="count"><div class="v" id="c-total">0</div><div class="l">Total Members</div></div>
  </div>
  <div class="tbl">
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Country</th><th>Phone</th><th>Joined</th><th>Access</th><th>Action</th></tr></thead>
      <tbody id="mbody"><tr><td colspan="7" style="text-align:center;color:var(--dim);padding:30px">loading...</td></tr></tbody>
    </table>
  </div>
</div></div>

<script>
async function adminLogin(){
  const pw=document.getElementById('apw').value;
  const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  const d=await r.json();
  if(d.ok){showPanel();}else{document.getElementById('aerr').textContent=d.error||'wrong password';}
}
async function adminSignout(){await fetch('/api/admin/signout',{method:'POST'});location.reload();}
async function showPanel(){
  document.getElementById('gate').style.display='none';
  document.getElementById('panel').style.display='block';
  loadMembers();
}
async function loadMembers(){
  const r=await fetch('/api/admin/members');
  if(r.status===401){document.getElementById('gate').style.display='flex';document.getElementById('panel').style.display='none';return;}
  const d=await r.json();
  document.getElementById('c-pending').textContent=d.pending;
  document.getElementById('c-approved').textContent=d.active;
  document.getElementById('c-total').textContent=d.members.length;
  const body=document.getElementById('mbody');
  if(!d.members.length){body.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--dim);padding:30px">No members yet</td></tr>';return;}
  body.innerHTML=d.members.map(m=>{
    const name=(m.first_name+' '+m.last_name).trim()||'-';
    let badge='',action='';
    if(m.access_label==='trial'){badge='<span class="badge approved">trial &middot; '+m.days_left+'d</span>';action='<button class="act revoke" onclick="act(\''+m.email+'\',\'revoke\')">Revoke</button>';}
    else if(m.access_label==='active'){badge='<span class="badge approved">paid &middot; '+m.days_left+'d</span>';action='<button class="act approve" onclick="act(\''+m.email+'\',\'extend_month\')">+1 month</button><button class="act revoke" onclick="act(\''+m.email+'\',\'revoke\')">Revoke</button>';}
    else if(m.access_label==='expired'){badge='<span class="badge rejected">expired</span>';action='<button class="act approve" onclick="act(\''+m.email+'\',\'extend_month\')">+1 month (paid)</button>';}
    else {badge='<span class="badge pending">pending</span>';action='<button class="act approve" onclick="act(\''+m.email+'\',\'approve_trial\')">Start 7-day trial</button>';}
    return '<tr><td>'+name+'</td><td class="muted">'+m.email+'</td><td>'+(m.country||'-')+'</td><td class="muted">'+(m.phone||'-')+'</td><td class="muted">'+(m.joined||'-')+'</td><td>'+badge+'</td><td>'+action+'</td></tr>';
  }).join('');
}
async function act(email,action){
  await fetch('/api/admin/set_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,action})});
  loadMembers();
}
// try to load straight away in case admin session already active
loadMembers().then(()=>{ if(document.getElementById('panel').style.display!=='block'){ fetch('/api/admin/members').then(r=>{if(r.status===200)showPanel();}); } });
</script></body></html>
