.klang-opt.sel{color:var(--accent);background:rgba(0,212,255,.06)}
.klang-opt.sel::after{content:' \2713';font-size:11px}

<script>
async function go(){
  const payload={
    first_name:document.getElementById('first').value,
    last_name:document.getElementById('last').value,
    email:document.getElementById('email').value,
    country:document.getElementById('country').value,
    phone:document.getElementById('phone').value,
    password:document.getElementById('pw').value,
    ref:(localStorage.getItem('kref')||new URLSearchParams(location.search).get('ref')||'').toUpperCase()
  };
  const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const d=await r.json();
  if(d.ok){location.href='/connect';}else{document.getElementById('err').textContent=d.error||'could not create account';}
}
</script><!--Kasandra Assistant-->
