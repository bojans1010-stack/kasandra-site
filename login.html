<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kasandra · Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060912;--card:#0d131f;--card-hi:#131b2e;--border:rgba(0,212,255,.18);--accent:#00d4ff;--green:#00ff88;--red:#ff3366;--text:#e0e6ed;--text-2:#a8b2c1;--dim:#5a6b80;--mono:'JetBrains Mono',monospace;--display:'Space Grotesk',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,212,255,.10),transparent 60%),var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,212,255,.018) 2px,rgba(0,212,255,.018) 3px)}
.box{position:relative;background:linear-gradient(135deg,var(--card),var(--card-hi));border:1px solid var(--border);border-radius:16px;padding:40px 34px;width:360px;box-shadow:0 0 40px rgba(0,212,255,.08)}
.brand{font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:.15em;color:var(--accent);text-shadow:0 0 18px rgba(0,212,255,.35);text-align:center;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.brand .dot{width:9px;height:9px;background:var(--green);border-radius:50%;box-shadow:0 0 12px var(--green)}
.sub{text-align:center;font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:28px}
label{display:block;font-size:11px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin:14px 0 6px}
input{width:100%;padding:13px 14px;border-radius:9px;border:1px solid var(--border);background:#0a0e16;color:var(--text);font-family:var(--mono);font-size:14px}
input:focus{outline:none;border-color:var(--accent)}
button{width:100%;margin-top:24px;padding:14px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),#0095c8);color:#03121a;font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.05em;cursor:pointer;transition:all .2s}
button:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,212,255,.35)}
.err{color:var(--red);font-size:12px;min-height:16px;margin-top:12px;text-align:center}
.alt{text-align:center;font-size:13px;color:var(--text-2);margin-top:22px}
.alt a{color:var(--accent);text-decoration:none}
.back{position:absolute;top:-34px;left:0;font-size:12px;color:var(--dim);text-decoration:none}
.back:hover{color:var(--accent)}
.klang{position:relative;display:inline-block;font-family:var(--mono)}
.klang-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-2);font-family:var(--mono);font-size:12px;font-weight:600;padding:7px 11px;cursor:pointer;transition:all .2s;width:auto;margin:0;box-shadow:none}
.klang-btn:hover{border-color:var(--accent);color:var(--accent);transform:none;box-shadow:none}
.klang-arrow{font-size:9px;opacity:.7}
.klang-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:170px;list-style:none;margin:0;padding:5px;background:var(--card-hi,#131b2e);border:1px solid var(--border);border-radius:9px;box-shadow:0 12px 34px rgba(0,0,0,.45);opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .16s;z-index:200}
.klang.open .klang-menu{opacity:1;visibility:visible;transform:translateY(0)}
.klang-opt{padding:9px 12px;border-radius:6px;font-size:12.5px;color:var(--text-2);cursor:pointer;white-space:nowrap;transition:all .15s}
.klang-opt:hover{background:rgba(0,212,255,.10);color:var(--accent)}
.klang-opt.sel{color:var(--accent);background:rgba(0,212,255,.06)}
.klang-opt.sel::after{content:' \2713';font-size:11px}
</style></head><body>
<div class="box">
<a href="/" class="back" data-i18n="auth.back">&larr; back to site</a>
<div class="brand"><span class="dot"></span>KASANDRA</div>
<div class="sub" data-i18n="auth.loginTitle">Member Login</div>
<label data-i18n="auth.email">Email</label>
<input id="email" type="email" placeholder="you@email.com" autofocus onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
<label data-i18n="auth.password">Password</label>
<input id="pw" type="password" onkeydown="if(event.key==='Enter')go()">
<button onclick="go()" data-i18n="auth.login">LOG IN</button>
<div class="err" id="err"></div>
<div class="alt"><span data-i18n="auth.noAccount">No account yet?</span> <a href="/signup" data-i18n="auth.createOne">Create one</a></div>
<div style="text-align:center;margin-top:18px"><span data-lang-dropdown></span></div>
</div>
<script src="/i18n.js?v=6"></script>
<script>
async function go(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('pw').value;
  const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const d=await r.json();
  if(d.ok){location.href='/members';}else{document.getElementById('err').textContent=d.error||'login failed';}
}
</script><!--Kasandra Assistant-->
<script>
(function(){
if(window.__kasChatInit)return; window.__kasChatInit=1;
var css=document.createElement("style");
css.textContent=`
#kas-bub{position:fixed;bottom:22px;right:22px;width:60px;height:60px;border-radius:50%;
background:linear-gradient(135deg,#e9c767,#c9a13b);box-shadow:0 6px 24px rgba(201,161,59,.45);
display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:99998;transition:transform .15s;border:none}
#kas-bub:hover{transform:scale(1.07)}
#kas-bub svg{width:28px;height:28px;fill:#1a1206}
#kas-win{position:fixed;bottom:94px;right:22px;width:370px;max-width:calc(100vw - 24px);height:520px;max-height:calc(100vh - 120px);
background:#0c1424;border:1px solid rgba(201,161,59,.5);border-radius:16px;z-index:99999;display:none;flex-direction:column;
overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.55);font-family:'Segoe UI',system-ui,sans-serif}
#kas-win.open{display:flex}
#kas-hd{background:linear-gradient(135deg,#c9a13b,#a9821f);padding:14px 16px;color:#1a1206;font-weight:700;display:flex;align-items:center;justify-content:space-between}
#kas-hd small{display:block;font-weight:500;font-size:11px;opacity:.8}
#kas-x{cursor:pointer;font-size:22px;line-height:1;background:none;border:none;color:#1a1206}
#kas-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.kas-m{max-width:82%;padding:9px 13px;border-radius:12px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.kas-a{background:#182338;color:#dde4f0;align-self:flex-start;border-bottom-left-radius:3px}
.kas-u{background:linear-gradient(135deg,#e9c767,#c9a13b);color:#1a1206;align-self:flex-end;border-bottom-right-radius:3px}
.kas-typ{color:#5a6478;font-size:12px;align-self:flex-start;padding:4px 6px}
#kas-in{display:flex;border-top:1px solid rgba(255,255,255,.08);padding:10px;gap:8px}
#kas-txt{flex:1;background:#182338;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;color:#dde4f0;font-size:13.5px;outline:none;resize:none;font-family:inherit}
#kas-snd{background:linear-gradient(135deg,#e9c767,#c9a13b);border:none;border-radius:10px;color:#1a1206;font-weight:700;padding:0 16px;cursor:pointer;font-size:13px}
#kas-foot{font-size:10px;color:#5a6478;text-align:center;padding:0 0 8px}`;
document.head.appendChild(css);
var b=document.createElement("button");b.id="kas-bub";
b.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 5.9 2 10.7c0 2.7 1.4 5.1 3.7 6.7-.2 1.3-.8 2.6-1.8 3.6 1.7-.2 3.3-.8 4.7-1.7 1.1.3 2.2.5 3.4.5 5.5 0 10-3.9 10-8.9S17.5 2 12 2z"/></svg>';
document.body.appendChild(b);
var w=document.createElement("div");w.id="kas-win";
w.innerHTML='<div id="kas-hd"><div>Kasandra Assistant<small>Instant answers, 24/7</small></div><button id="kas-x">&times;</button></div>'+
'<div id="kas-msgs"></div>'+
'<div id="kas-in"><textarea id="kas-txt" rows="1" placeholder="Ask about signals, pricing, brokers..."></textarea><button id="kas-snd">Send</button></div>'+
'<div id="kas-foot">AI assistant &middot; not financial advice</div>';
document.body.appendChild(w);
var msgs=document.getElementById("kas-msgs"),txt=document.getElementById("kas-txt"),hist=[],busy=false,greeted=false;
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function add(role,text){var m=document.createElement("div");m.className="kas-m "+(role==="user"?"kas-u":"kas-a");m.innerHTML=esc(text);msgs.appendChild(m);msgs.scrollTop=msgs.scrollHeight;}
function toggle(){var o=w.classList.toggle("open");if(o&&!greeted){greeted=true;add("assistant","Hi! I am the Kasandra Assistant. Ask me anything about the gold signals, pricing, brokers, or getting started.");}if(o)txt.focus();}
b.onclick=toggle;document.getElementById("kas-x").onclick=toggle;
async function send(){var v=txt.value.trim();if(!v||busy)return;txt.value="";add("user",v);hist.push({role:"user",content:v});busy=true;
var t=document.createElement("div");t.className="kas-typ";t.textContent="typing...";msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;
try{var r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:hist})});var d=await r.json();t.remove();
var reply=d.ok?d.reply:(d.error||"Something went wrong. Reach us on Telegram @Kasandra_tech.");add("assistant",reply);hist.push({role:"assistant",content:reply});}
catch(e){t.remove();add("assistant","Connection issue. You can also reach us on Telegram @Kasandra_tech.");}
busy=false;}
document.getElementById("kas-snd").onclick=send;
txt.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
})();
</script>
<!--End Kasandra Assistant-->
</body></html>
